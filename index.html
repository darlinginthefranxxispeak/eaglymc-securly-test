<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaglyMC - Fullscreen</title>
    <style>
        /* Removes all borders and prevents scrolling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Forces the game to fill the entire window */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- This iframe will be loaded with the Blob URL -->
    <iframe 
        id="eagler-frame"
        src="about:blank" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad; pointer-lock; clipboard-write" 
        allowfullscreen="true">
    </iframe>

    <script>
        // 1. The Direct Game Link
        const gameUrl = "https://client.eaglercraft.win/eagler-files/modded/1.8/EaglyMC/index.html";

        // 2. The Blob Content
        // We include pointer-lock here so the mouse works correctly in Minecraft
        const blobContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${gameUrl}" allow="autoplay; fullscreen; keyboard-quotas; gamepad; pointer-lock; clipboard-write" allowfullscreen="true"></iframe>
            </body>
            </html>
        `;

        // 3. Create the Blob
        const blob = new Blob([blobContent], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        // 4. Load the Blob into the iframe
        const frame = document.getElementById('eagler-frame');
        frame.src = blobUrl;

        /* 
           Minecraft Fix: Clicking ensures the game gets focus 
           so that the WASD keys and mouse-look work immediately.
        */
        window.onclick = function() {
            frame.focus();
        };

        window.onload = function() {
            frame.focus();
        };
    </script>

</body>
</html>
