<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Media Viewer</title>
    <style>
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        #start-btn { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #6200ea; color: white; border: none; border-radius: 10px; transition: 0.3s; }
        #start-btn:hover { background: #3700b3; transform: scale(1.1); }
    </style>
</head>
<body>

    <button id="start-btn">Launch Application</button>

    <script>
        document.getElementById('start-btn').onclick = function() {
            // The URL "https://anikai.to/home" encoded in Base64 to hide it from filters
            const encodedUrl = "aHR0cHM6Ly9hbmlrYWkudG8vaG9tZQ=="; 
            const decodedUrl = atob(encodedUrl);

            // Create a new window
            const win = window.open('about:blank', '_blank');
            
            // Inject a "No-Referrer" environment into the new window
            win.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta name="referrer" content="no-referrer">
                    <title>System</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                        iframe { width: 100vw; height: 100vh; border: none; }
                    </style>
                </head>
                <body>
                    <iframe 
                        src="${decodedUrl}" 
                        allow="autoplay; fullscreen; picture-in-picture; encrypted-media" 
                        allowfullscreen="true">
                    </iframe>
                </body>
                </html>
            `);
            win.document.close();
        };
    </script>
</body>
</html>
