<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anikai - Home</title>
    <style>
        /* Make the window fill every pixel */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Fullscreen iframe */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Main container iframe -->
    <iframe 
        id="anikai-frame"
        src="about:blank" 
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media" 
        allowfullscreen="true">
    </iframe>

    <script>
        // 1. The target URL
        const targetUrl = "https://anikai.to/home";

        // 2. The Blob content
        // We include specific permissions for video streaming (encrypted-media, pip)
        const blobContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                </style>
            </head>
            <body>
                <iframe 
                    src="${targetUrl}" 
                    allow="autoplay; fullscreen; picture-in-picture; encrypted-media" 
                    allowfullscreen="true">
                </iframe>
            </body>
            </html>
        `;

        // 3. Create the Blob and its URL
        const blob = new Blob([blobContent], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        // 4. Inject the Blob URL into the frame
        const frame = document.getElementById('anikai-frame');
        frame.src = blobUrl;

        // Ensure the frame is focused
        window.onclick = function() {
            frame.focus();
        };
    </script>

</body>
</html>
