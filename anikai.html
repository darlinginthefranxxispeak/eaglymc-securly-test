<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #ff3e3e;
            border: none;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #cc3232;
            transform: scale(1.05);
        }
        p { margin-top: 20px; color: #888; }
    </style>
</head>
<body>

    <button id="launch">Launch Anikai</button>
    <p>(Opens in a hidden about:blank tab to prevent blocking)</p>

    <script>
        document.getElementById('launch').onclick = function() {
            // 1. The URL you want to open
            const url = "https://anikai.to/home";

            // 2. Open a new blank window
            const win = window.open('about:blank', '_blank');

            // 3. Create an iframe inside that blank window
            const iframe = win.document.createElement('iframe');
            
            // 4. Style the iframe to fill the screen
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.style.position = "fixed";
            iframe.style.top = "0";
            iframe.style.left = "0";
            iframe.style.margin = "0";
            iframe.style.padding = "0";
            
            // 5. Add permissions for video players
            iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture; encrypted-media');
            iframe.setAttribute('allowfullscreen', 'true');

            // 6. Set the source to Anikai
            iframe.src = url;

            // 7. Inject the iframe into the blank window
            win.document.body.appendChild(iframe);
            win.document.body.style.margin = "0";
            win.document.body.style.padding = "0";
        };
    </script>
</body>
</html>
